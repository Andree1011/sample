<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shopping</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-top">
        <span class="app-title">🛍️ Shopping</span>
        <button class="cart-btn" onclick="ShoppingApp.openCart()">
          🛒
          <span class="cart-badge" id="cart-badge" style="display:none">0</span>
        </button>
      </div>
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search products..."
          autocomplete="off"
        >
      </div>
    </header>

    <!-- Hero Banner -->
    <div class="banner">
      <div class="banner-text">
        <h3>Summer Sale 🎉</h3>
        <p>Up to 40% off on selected items</p>
      </div>
      <span class="banner-emoji">🏷️</span>
    </div>

    <!-- Categories -->
    <div class="categories">
      <button class="category-pill active" data-category="All">All</button>
      <button class="category-pill" data-category="Electronics">Electronics</button>
      <button class="category-pill" data-category="Sports">Sports</button>
      <button class="category-pill" data-category="Kitchen">Kitchen</button>
      <button class="category-pill" data-category="Fashion">Fashion</button>
      <button class="category-pill" data-category="Office">Office</button>
    </div>

    <!-- Products Grid -->
    <div class="products-grid" id="products-grid">
      <div style="grid-column:1/-1;text-align:center;padding:40px">
        <div class="spinner" style="margin:0 auto"></div>
      </div>
    </div>
  </div>

  <!-- Cart Panel -->
  <div class="cart-panel" id="cart-panel">
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-content">
      <div class="cart-title">Shopping Cart 🛒</div>
      <div id="cart-items"></div>
      <div class="cart-total">
        <span>Total</span>
        <span id="cart-total-amount">$0.00</span>
      </div>
      <button class="checkout-btn" onclick="ShoppingApp.checkout()">
        Proceed to Checkout →
      </button>
    </div>
  </div>

  <!-- Product Detail Modal -->
  <div id="product-modal" style="
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);
    z-index:250; align-items:flex-end; justify-content:center;
  " onclick="if(event.target===this) this.style.display='none'">
    <div style="
      background:white; border-radius:20px 20px 0 0; padding:28px 24px;
      width:100%; max-width:480px;
    ">
      <div class="modal-emoji" style="font-size:72px;text-align:center;margin-bottom:12px"></div>
      <h2 class="modal-name" style="font-size:20px;font-weight:700;margin-bottom:8px"></h2>
      <div class="modal-rating" style="color:#888;font-size:13px;margin-bottom:8px"></div>
      <div class="modal-price" style="font-size:26px;font-weight:700;color:#6C63FF;margin-bottom:20px"></div>
      <button class="modal-add-btn" style="
        width:100%;padding:16px;background:#6C63FF;color:white;border:none;
        border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;
      ">Add to Cart</button>
    </div>
  </div>

  <!-- Order Confirmation Modal -->
  <div id="order-modal" style="
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);
    z-index:250; align-items:center; justify-content:center;
  ">
    <div style="
      background:white; border-radius:20px; padding:32px 24px;
      width:calc(100% - 48px); max-width:360px; text-align:center;
    ">
      <div style="font-size:64px;margin-bottom:16px">✅</div>
      <h2 style="font-size:22px;font-weight:700;margin-bottom:8px">Order Placed!</h2>
      <p class="order-txn" style="color:#888;margin-bottom:8px"></p>
      <p style="color:#888;font-size:14px;margin-bottom:4px">Total paid:</p>
      <p class="order-amount" style="font-size:24px;font-weight:700;color:#6C63FF;margin-bottom:24px"></p>
      <p style="font-size:13px;color:#888;margin-bottom:20px">
        You'll receive a notification when your order ships!
      </p>
      <button onclick="document.getElementById('order-modal').style.display='none'" style="
        width:100%;padding:14px;background:#6C63FF;color:white;border:none;
        border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;
      ">Continue Shopping</button>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <p>Processing...</p>
  </div>

  <script src="js/bridge.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
